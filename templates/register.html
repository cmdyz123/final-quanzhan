{% extends "base.html" %}
{% block title %}NutriSnap - 注册{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-4">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">
                        <i class="bi bi-person-plus"></i> 创建账号
                    </h4>

                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <!-- Account Info -->
                        <h6 class="text-muted mb-3">账户信息</h6>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="username" class="form-label">用户名 *</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">邮箱 *</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="col-md-6">
                                <label for="password" class="form-label">密码 *</label>
                                <input type="password" class="form-control" id="password" name="password" required minlength="6">
                            </div>
                            <div class="col-md-6">
                                <label for="password2" class="form-label">确认密码 *</label>
                                <input type="password" class="form-control" id="password2" name="password2" required>
                            </div>
                        </div>

                        <!-- Body Info -->
                        <h6 class="text-muted mb-3">身体数据</h6>
                        <div class="row g-3 mb-3">
                            <div class="col-6 col-md-4">
                                <label for="height" class="form-label">身高 (cm)</label>
                                <input type="number" class="form-control" id="height" name="height" step="0.1" placeholder="170">
                            </div>
                            <div class="col-6 col-md-4">
                                <label for="weight" class="form-label">体重 (kg)</label>
                                <input type="number" class="form-control" id="weight" name="weight" step="0.1" placeholder="65">
                            </div>
                            <div class="col-6 col-md-4">
                                <label for="age" class="form-label">年龄</label>
                                <input type="number" class="form-control" id="age" name="age" placeholder="25">
                            </div>
                            <div class="col-6 col-md-4">
                                <label for="gender" class="form-label">性别</label>
                                <select class="form-select" id="gender" name="gender">
                                    <option value="">请选择</option>
                                    <option value="male">男</option>
                                    <option value="female">女</option>
                                </select>
                            </div>
                            <div class="col-6 col-md-4">
                                <label for="goal" class="form-label">健康目标</label>
                                <select class="form-select" id="goal" name="goal">
                                    <option value="maintain">维持体重</option>
                                    <option value="lose">减重</option>
                                    <option value="gain">增肌</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="bi bi-check-circle"></i> 注册
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted">已有账号？</span>
                        <a href="{{ url_for('auth.index') }}" class="text-decoration-none">去登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
