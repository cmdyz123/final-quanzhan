{% extends "base.html" %}
{% block title %}NutriSnap - 登录{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <!-- Hero -->
            <div class="text-center mb-4">
                <h1 class="fw-bold text-gradient">
                    <i class="bi bi-camera2 display-4"></i>
                </h1>
                <h2 class="fw-bold">NutriSnap</h2>
                <p class="text-muted">AI智能营养管家 — 拍一拍，吃得更明白</p>
            </div>

            <!-- Login Card -->
            <div class="card shadow">
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-4">登录</h5>
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> 登录
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted">还没有账号？</span>
                        <a href="{{ url_for('auth.register') }}" class="text-decoration-none">立即注册</a>
                    </div>
                </div>
            </div>

            <!-- Features Preview -->
            <div class="row mt-4 g-3 text-center">
                <div class="col-4">
                    <div class="text-muted small">
                        <i class="bi bi-camera fs-4"></i><br>
                        <span>拍照识食</span>
                    </div>
                </div>
                <div class="col-4">
                    <div class="text-muted small">
                        <i class="bi bi-graph-up fs-4"></i><br>
                        <span>营养分析</span>
                    </div>
                </div>
                <div class="col-4">
                    <div class="text-muted small">
                        <i class="bi bi-robot fs-4"></i><br>
                        <span>AI营养师</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
